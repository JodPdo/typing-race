# nginx server block for race.aiklaotrip.com (Typing Race — Phase 6C).
#
# This box ALREADY runs nginx + PM2 with other apps on ports 3000–3003 — DO NOT touch
# those. This app owns port 3004 only. TLS (443 / certbot) for this domain is ALREADY
# managed by the existing setup; after certbot runs it will inject the listen 443 / ssl_*
# directives and an http->https redirect into this server block (or a managed copy). The
# block below is the application config: static client + reverse proxy to the Node server.
#
# Install: see DEPLOY.md (copy to /etc/nginx/sites-available, symlink into sites-enabled,
# `sudo nginx -t`, `sudo systemctl reload nginx`).

server {
    listen 80;
    listen [::]:80;
    server_name race.aiklaotrip.com;

    # --- Static client (Vite build output, deployed by CI to this path) ---------------
    # Serve the compiled SPA. try_files falls back to index.html so client-side routes
    # (and reloads on any path) resolve to the React app.
    root /var/www/typing-race/client;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # --- Socket.IO (WebSocket) --------------------------------------------------------
    # The Upgrade/Connection headers are REQUIRED: Socket.IO starts as an HTTP request and
    # then upgrades to the WebSocket protocol. Without these headers nginx would proxy it
    # as plain HTTP and the realtime connection (race ticks, presence) would fail / fall
    # back to slow polling. proxy_http_version 1.1 is required for keep-alive upgrades.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s; # keep idle WebSockets alive between races
    }

    # --- REST API (leaderboard, health) ----------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3004;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
